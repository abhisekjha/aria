<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .status-hot    { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
    .status-warm   { background:#fff7ed; color:#ea580c; border:1px solid #fdba74; }
    .status-cold   { background:#f0f9ff; color:#0284c7; border:1px solid #7dd3fc; }
    .stage-badge   { font-size:11px; padding:2px 8px; border-radius:9999px; font-weight:600; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- Sidebar -->
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0">
      <div class="px-5 py-5 border-b border-slate-700">
        <div class="text-white font-bold text-lg tracking-tight">Aria</div>
        <div class="text-slate-500 text-xs mt-0.5">Auralix Sales Agent</div>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/ui" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm
           {% if active == 'dashboard' %}bg-slate-700 text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
          <span>📊</span> Dashboard
        </a>
        <a href="/ui/prospects" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm
           {% if active == 'prospects' %}bg-slate-700 text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
          <span>👥</span> Prospects
        </a>
        <a href="/ui/pipeline" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm
           {% if active == 'pipeline' %}bg-slate-700 text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
          <span>🔀</span> Pipeline
        </a>
        <a href="/ui/activity" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm
           {% if active == 'activity' %}bg-slate-700 text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
          <span>📋</span> Activity
        </a>
        <a href="/ui/config" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm
           {% if active == 'config' %}bg-slate-700 text-white{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
          <span>⚙️</span> Config
        </a>
      </nav>

      <div class="px-5 py-4 border-t border-slate-700">
        <div class="text-xs text-slate-500">
          <span id="dry-run-badge" class="inline-block px-2 py-0.5 rounded text-xs font-medium
            {% if dry_run %}bg-yellow-900 text-yellow-300{% else %}bg-green-900 text-green-300{% endif %}">
            {% if dry_run %}DRY RUN{% else %}LIVE{% endif %}
          </span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <div class="px-8 py-6 max-w-6xl">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    // Auto-refresh every 60 seconds
    setTimeout(() => location.reload(), 60000);
  </script>
</body>
</html>
